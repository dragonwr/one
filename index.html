
<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>职业履历 · 移动优化版</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js" defer></script>
  <style>
    /*
    ═══════════════════════════════════════════════════════════
     FONT STACKS — 系统原生字体，零外部依赖
     · 等宽数字: SF Mono → Cascadia → Consolas → monospace
     · 中文正文: PingFang SC → Microsoft YaHei → sans-serif
    ═══════════════════════════════════════════════════════════
    */
    /*
    ═══════════════════════════════════════════════════════════
     DESIGN LANGUAGE — 卡片书架 · 移动优先版
    ═══════════════════════════════════════════════════════════

    【色彩体系】
    - 7 色卡片标识：每张卡片绑定一个主题色，通过 --card 变量驱动所有子元素
      · Coral #ef7d69  · Blue #5b9cf6   · Green #48b987  · Amber #e6a53d
      · Purple #9b7be8 · Teal #41bfae   · Rose #d86c82
    - 页面底色：三层渐变叠加（左上粉光 + 右下蓝光 + 中灰白）
    - 卡片底色：暖纸白 #fffdf9 + 半透明白渐变，配合 inset 高光模拟纸卡质感
    - 中性色：墨水黑 #172033 / 灰蓝 #778197 / 线条 #e5e8ee

    【字体系统】
    - 等宽（SF Mono / Cascadia / Consolas）：序号、时长、年份 — 数据感
    - 无衬线（PingFang SC / Microsoft YaHei）：标题、正文 — 中文阅读舒适
    - 层级：标题 26px/800 → 角色 15px/600 → 正文 14px → 标签 11px
    - 全负字距收紧，标题 letter-spacing: -.05em

    【空间结构】
    - 桌面端（>760px）：左 270px 时间轴 + 右弹性卡片舞台，perspective 1800px
    - 移动端（≤760px）：上横向滚动时间轴 + 下单卡全宽
    - 卡片：大圆角 18-20px、底部主题色厚边 4-6px、左侧装饰条

    【光影】
    - 卡片阴影：大半径低透明度环境投影 + 底部色条
    - 卡片伪元素：::before 主题色径向渐变叠加 + ::after 左侧装饰条
    - 时长数字：-webkit-text-stroke 透明描边空心大字，装饰性视觉锚点
    - 时间轴圆点：active 态渐变填充 + 多层扩散光环

    【动效】
    - GSAP 驱动：卡片切换 power3.out 入场 / 圆点 sine.inOut 呼吸脉冲
    - 点击荡漾：点击/触摸卡片任意位置，主题色水波从该点扩散消散
    - 反向位移：桌面端卡片向鼠标移动反方向平移（max 10px），GSAP quickTo 驱动
    - 移动端触摸滑动切换（阈值 44px）+ 卡片从右滑入效果
    - 控制面板 localStorage 持久化所有调参

    【移动端专项】
    - 时间轴：横向滚动 pill 条，奇偶交错（偶数下方 / 奇数上方），::before 静态线
    - 卡片：竖版分区 — header bar / 标题角色 / 分割线 / bullet 要点 / 分割线 / 标签
    - 卡片层叠：纯垂直偏移（无水平），active=0 / 下方 pos=1~3 递增 Y offset + scale 缩小 + saturate 降低
      露出的底部边缘显示 .card-date-strip（日期 + 时长），active 卡片隐藏 date strip
    - 底部控制面板：圆角 sheet 弹出 + 半透明遮罩

    【核心哲学卡片】— 个人叙事锚点
    - 引用句 + 粗体关键词 + 9 枚 pill 能力标签
    - 左侧 accent 色装饰条，暖白半透明背景，与 header 自然过渡
    ═══════════════════════════════════════════════════════════
    */
    :root {
      --ink: #172033;
      --muted: #778197;
      --paper: #fffdf9;
      --line: #e5e8ee;
      --accent: #ef7d69;
    }
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      background:
        radial-gradient(circle at 7% 12%, #fce7f3 0, transparent 25%),
        radial-gradient(circle at 94% 82%, #e0f0ff 0, transparent 28%),
        linear-gradient(135deg, #f8fafc 0%, #f6f2f7 48%, #eef6f4 100%);
      font-family: "PingFang SC", "Microsoft YaHei", "Hiragino Sans GB", "WenQuanYi Micro Hei", system-ui, sans-serif;
      -webkit-tap-highlight-color: transparent;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Desktop Layout (≥761px) ── */
    .page {
      width: min(1120px, calc(100% - 48px));
      margin: 0 auto;
      padding: 64px 0 76px;
    }
    header {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 24px;
      padding-bottom: 30px;
      border-bottom: 1px solid var(--line);
    }
    .eyebrow {
      margin: 0 0 10px;
      color: var(--accent);
      font: 500 11px/1 "SF Mono", "Cascadia Code", "Consolas", "Menlo", monospace;
      letter-spacing: .13em;
      text-transform: uppercase;
    }
    h1 {
      margin: 0;
      font-size: clamp(32px, 4vw, 52px);
      letter-spacing: -.07em;
      line-height: 1.05;
    }
    header p {
      max-width: 330px;
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.75;
    }

    /* ── Core Practice Showcase Card ── */
    .core-philosophy {
      position: relative;
      max-width: 100%;
      margin: 28px 10px 0 0;
      padding: 26px 30px 25px;
      border: 1px solid #cfd6e0;
      border-radius: 15px;
      background: #fff;
      box-shadow: 10px 10px 0 color-mix(in srgb, var(--accent) 28%, #e1e7ef);
    }
    .core-philosophy .showcase-kicker {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin: 0 0 13px;
      color: var(--accent);
      font: 600 10px/1.2 "SF Mono", "Cascadia Code", "Consolas", "Menlo", monospace;
      letter-spacing: .12em;
      text-transform: uppercase;
    }
    .core-philosophy .showcase-kicker span:last-child {
      color: var(--muted);
      letter-spacing: .08em;
    }
    .core-philosophy .showcase-statement {
      display: block;
      max-width: 930px;
      margin: 0 0 16px;
      font-size: 18px;
      font-weight: 650;
      line-height: 1.62;
      letter-spacing: -.025em;
      color: var(--ink);
    }
    .core-philosophy .showcase-statement b {
      color: var(--accent);
      font-weight: 750;
    }
    .core-philosophy .traits {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 10px;
      padding-top: 15px;
      border-top: 1px solid #e4e8ee;
    }
    .core-philosophy .traits span {
      display: inline-block;
      padding: 5px 12px;
      font-size: 12px;
      font-weight: 550;
      letter-spacing: .02em;
      color: #526075;
      background: #f6f8fb;
      border: 1px solid #dfe4eb;
      border-radius: 999px;
    }

    /* Desktop two-column */
    .experience {
      display: grid;
      grid-template-columns: 270px minmax(0, 1fr);
      gap: 64px;
      margin-top: 42px;
      min-height: 620px;
    }

    /* ── Desktop Timeline (left column, vertical) ── */
    .desktop-timeline {
      position: relative;
      padding: 10px 0;
    }
    .desktop-timeline::before {
      content: "";
      position: absolute;
      width: 3px;
      top: 20px;
      bottom: 20px;
      left: 8px;
      border-radius: 99px;
      background: #d9dee7;
      box-shadow: 0 0 0 1px rgba(255,255,255,.72), 0 3px 14px rgba(79,172,254,.08);
    }
    .tl-fill {
      position: absolute;
      left: 8px;
      width: 3px;
      border-radius: 99px;
      background: linear-gradient(180deg, var(--progress, #4facfe), color-mix(in srgb, var(--progress, #4facfe) 20%, #fff));
      box-shadow: 0 0 10px color-mix(in srgb, var(--progress, #4facfe) 38%, transparent);
      pointer-events: none;
      transition: top .48s cubic-bezier(.2,.75,.15,1), background .25s;
      top: 20px;
      bottom: 20px;
    }
    .tl-indicator {
      position: absolute;
      left: 1px;
      width: 17px;
      height: 17px;
      border: 2px solid var(--indicator, #ef7d69);
      border-radius: 50%;
      pointer-events: none;
      z-index: 3;
      box-shadow:
        0 0 0 5px color-mix(in srgb, var(--indicator, #ef7d69) 14%, transparent),
        0 4px 12px color-mix(in srgb, var(--indicator, #ef7d69) 28%, transparent);
      transition: top .55s cubic-bezier(.2,.75,.15,1), border-color .3s, box-shadow .3s;
    }
    .desktop-timeline button {
      position: relative;
      display: grid;
      grid-template-columns: 20px 1fr;
      width: 100%;
      padding: 0 0 18px;
      border: 0;
      background: transparent;
      text-align: left;
      color: var(--muted);
      cursor: pointer;
      font-family: inherit;
    }
    .desktop-timeline button:last-child { padding-bottom: 0; }
    .dot {
      width: 19px;
      height: 19px;
      margin-top: 2px;
      border: 5px solid #f5f6f8;
      border-radius: 50%;
      background: #c9ced8;
      box-shadow: 0 0 0 1px #c9ced8;
      transition: .35s cubic-bezier(.2,.8,.2,1);
      z-index: 1;
      flex-shrink: 0;
    }
    .time-copy {
      padding-left: 16px;
      transition: .3s;
    }
    .time {
      display: block;
      font: 500 11px/1.3 "SF Mono", "Cascadia Code", "Consolas", "Menlo", monospace;
      letter-spacing: .05em;
    }
    .company-name {
      display: block;
      margin-top: 5px;
      font-size: 14px;
      font-weight: 600;
      line-height: 1.35;
    }
    .desktop-timeline button[aria-current="true"] { color: var(--ink); }
    .desktop-timeline button[aria-current="true"] .dot {
      background: linear-gradient(135deg, #fff 0 22%, var(--card) 23%);
      box-shadow:
        0 0 0 1px var(--card),
        0 0 0 7px color-mix(in srgb, var(--card) 16%, transparent),
        0 5px 14px color-mix(in srgb, var(--card) 28%, transparent);
      transform: scale(1.18);
    }
    .desktop-timeline button[aria-current="true"] .company-name { color: var(--card); }
    .desktop-timeline button.preview .time-copy { transform: translateX(3px); }
    .desktop-timeline button.preview .time { color: var(--card); font-size: 12px; }
    .desktop-timeline button.preview .company-name {
      color: var(--ink);
      font-size: 16px;
      letter-spacing: -.02em;
    }

    /* ── Desktop Book Stage ── */
    .bookstage {
      position: relative;
      height: 620px;
      perspective: 1800px;
    }
    .bookstage.is-flipping { pointer-events: none; }
    .bookstage::after {
      content: "";
      position: absolute;
      width: 72%;
      height: 18px;
      bottom: -12px;
      left: 14%;
      background: rgba(30, 39, 55, .18);
      filter: blur(18px);
      border-radius: 50%;
    }

    /* ── Card ── */
    .card {
      --card: #ef7d69;
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      padding: clamp(28px, 5vw, 52px);
      border: 1px solid rgba(255, 255, 255, .75);
      border-bottom: 6px solid color-mix(in srgb, var(--card) 64%, #fff);
      border-radius: 25px;
      background: linear-gradient(145deg, rgba(255,255,255,.96), rgba(250,252,255,.88));
      overflow: visible;
      box-shadow:
        9px 9px 0 0 color-mix(in srgb, var(--card) 28%, #fff),
        0 18px 50px rgba(27, 38, 55, .1),
        inset 0 1px rgba(255, 255, 255, .9);
      transform-origin: 50% 100%;
      transform-style: preserve-3d;
      backface-visibility: hidden;
      transition: transform .62s cubic-bezier(.2,.75,.15,1), opacity .4s ease, filter .4s ease;
    }
    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 100% 0, color-mix(in srgb, var(--card) 24%, transparent), transparent 35%),
        radial-gradient(circle at 0% 100%, color-mix(in srgb, var(--card) 12%, transparent), transparent 30%),
        linear-gradient(125deg, transparent 56%, color-mix(in srgb, var(--card) 9%, transparent));
      pointer-events: none;
    }
    .card:not(.active) {
      background: linear-gradient(145deg, rgba(255,255,255,.995), rgba(239,245,252,.985));
      box-shadow:
        9px 9px 0 0 color-mix(in srgb, var(--card) 32%, #fff),
        0 18px 32px rgba(27, 38, 55, .18),
        inset 0 1px rgba(255, 255, 255, .98);
      cursor: pointer;
    }
    .card:not(.active)::before { opacity: .48; }
    .card:not(.active) > * { filter: blur(8px); opacity: .08; }
    .card:not(.active) .card-count { display: none; }
    .card[data-pos="1"] { transform: translate(var(--offset-x), var(--offset-y)) scale(.978) rotateX(var(--offset-r)); filter: saturate(.86); }
    .card[data-pos="2"] { transform: translate(var(--offset-x), var(--offset-y)) scale(.956) rotateX(var(--offset-r)); filter: saturate(.74); }
    .card[data-pos="3"] { transform: translate(var(--offset-x), var(--offset-y)) scale(.934) rotateX(var(--offset-r)); filter: saturate(.64); }
    .card[data-pos="4"] { transform: translate(var(--offset-x), var(--offset-y)) scale(.912) rotateX(var(--offset-r)); filter: saturate(.54); }
    .card[data-pos="5"] { transform: translate(var(--offset-x), var(--offset-y)) scale(.89) rotateX(var(--offset-r)); filter: saturate(.45); }
    .card[data-pos="6"] { transform: translate(var(--offset-x), var(--offset-y)) scale(.868) rotateX(var(--offset-r)); filter: saturate(.38); }
    .card.active { opacity: 1; filter: none; transform: translateY(0) scale(1) rotateX(0); }
    .card > * { position: relative; z-index: 1; }
    .card-top {
      display: flex;
      align-items: start;
      justify-content: space-between;
      gap: 18px;
    }
    .index {
      color: var(--card);
      font: 500 12px/1 "SF Mono", "Cascadia Code", "Consolas", "Menlo", monospace;
      letter-spacing: .12em;
    }
    .place {
      color: var(--muted);
      font-size: 13px;
    }
    .duration {
      position: absolute;
      top: var(--duration-y, 92px);
      right: var(--duration-x, 38px);
      color: transparent;
      font: 800 clamp(88px, var(--duration-size, 154px), 210px)/.8 "SF Mono", "Cascadia Code", "Consolas", "Menlo", monospace;
      letter-spacing: var(--duration-gap, .02em);
      -webkit-text-stroke: var(--duration-stroke, 1px) color-mix(in srgb, var(--card) 43%, transparent);
      opacity: .72;
      user-select: none;
      z-index: 0;
    }
    .card h2 {
      max-width: 590px;
      margin: 52px 0 11px;
      font-size: clamp(25px, 3.2vw, 38px);
      letter-spacing: -.065em;
      line-height: 1.12;
      z-index: 2;
    }
    .role {
      margin: 0;
      color: var(--card);
      font-weight: 700;
      font-size: 15px;
    }
    .summary {
      max-width: 590px;
      margin: 27px 0 0;
      color: #455064;
      font-size: 14px;
      line-height: 1.85;
    }
    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: auto;
      padding-top: 28px;
    }
    .tags span {
      padding: 7px 11px;
      border: 1px solid color-mix(in srgb, var(--card) 25%, #fff);
      border-radius: 999px;
      color: #526075;
      background: rgba(255, 255, 255, .58);
      font-size: 12px;
    }
    .card-count {
      display: block;
      margin: 20px auto 0;
      color: #a9b1c0;
      font: 500 12px/1 "SF Mono", "Cascadia Code", "Consolas", "Menlo", monospace;
      text-align: center;
    }
    .hint {
      margin: 18px 0 0 334px;
      color: #98a1b1;
      font-size: 12px;
    }

    /* ── Controls ── */
    .controls {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 20;
    }
    .control-toggle {
      width: 44px;
      height: 44px;
      border: 0;
      border-radius: 50%;
      background: linear-gradient(135deg, #4facfe, #a78bfa);
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      box-shadow: 0 7px 22px rgba(79, 172, 254, .35);
      transition: transform .2s;
    }
    .control-toggle:active { transform: scale(.92); }
    .control-panel {
      position: absolute;
      top: 55px;
      right: 0;
      width: 246px;
      padding: 18px;
      border: 1px solid rgba(255, 255, 255, .85);
      border-radius: 18px;
      background: rgba(255, 255, 255, .88);
      box-shadow: 0 18px 50px rgba(27, 38, 55, .15);
      backdrop-filter: blur(18px);
      opacity: 0;
      transform: translateY(-8px) scale(.96);
      pointer-events: none;
      transition: .25s ease;
    }
    .controls.open .control-panel {
      opacity: 1;
      transform: none;
      pointer-events: auto;
    }
    .control-panel h3 {
      margin: 0 0 14px;
      font-size: 13px;
    }
    .control-row {
      margin-top: 13px;
    }
    .control-row label {
      display: flex;
      justify-content: space-between;
      color: #5f6b80;
      font-size: 12px;
    }
    .control-row output {
      color: var(--ink);
      font-family: "SF Mono", "Cascadia Code", "Consolas", "Menlo", "Courier New", monospace;
    }
    .control-row input {
      width: 100%;
      margin: 7px 0 0;
      accent-color: #4facfe;
    }

    /* ══════════════════════════════════════════ */
    /* ── Mobile Layout (≤760px) ── */
    /* ══════════════════════════════════════════ */
    @media (max-width: 760px) {
      .page {
        width: 100%;
        padding: 24px 16px 36px;
      }
      header {
        display: block;
        padding-bottom: 18px;
        border-bottom-width: 1px;
      }
      .eyebrow {
        margin-bottom: 6px;
        font-size: 10px;
        letter-spacing: .11em;
      }
      h1 {
        font-size: 30px;
        letter-spacing: -.06em;
      }
      header p {
        display: none;
      }

      /* ── Mobile: Core Practice Showcase Card ── */
      .core-philosophy {
        margin: 20px 7px 0 0;
        padding: 20px 18px 18px;
        border-radius: 12px;
        box-shadow: 7px 7px 0 color-mix(in srgb, var(--accent) 28%, #e1e7ef);
      }
      .core-philosophy .showcase-kicker {
        margin-bottom: 11px;
        font-size: 9px;
      }
      .core-philosophy .showcase-statement {
        font-size: 15px;
        line-height: 1.62;
        margin-bottom: 13px;
      }
      .core-philosophy .traits {
        gap: 6px 8px;
        padding-top: 12px;
      }
      .core-philosophy .traits span {
        font-size: 11px;
        padding: 4px 10px;
      }

      /* ── Mobile: full-width, no side timeline ── */
      .experience {
        display: flex;
        flex-direction: column;
        gap: 0;
        margin-top: 0;
        min-height: auto;
      }

      /* ── Mobile Timeline Strip (matching original resume.html logic) ── */
      .desktop-timeline {
        position: relative;
        height: 130px;
        overflow-x: auto;
        overflow-y: visible;
        overscroll-behavior-x: contain;
        scroll-snap-type: x mandatory;
        scrollbar-width: none;
        -webkit-overflow-scrolling: touch;
        display: flex;
        gap: 0;
        padding: 0 16px;
      }
      .desktop-timeline::-webkit-scrollbar { display: none; }

      /* Static line — spans visible area (matching original ::before) */
      .desktop-timeline::before {
        content: "";
        position: absolute;
        top: 55px;
        left: 16px;
        right: 16px;
        height: 2px;
        border-radius: 99px;
        background: #dfe4ec;
        pointer-events: none;
        z-index: 0;
      }

      /* Remove JS-driven line — ::before handles it */
      .tl-line { display: none; }

      /* Fill line — left edge anchored to ::before line start */
      .tl-fill {
        position: absolute;
        top: 55px;
        height: 2px;
        left: 16px;
        width: 0;
        border-radius: 99px;
        background: linear-gradient(90deg, var(--progress, #4facfe), color-mix(in srgb, var(--progress, #4facfe) 30%, #dfe4ec));
        box-shadow: 0 0 8px color-mix(in srgb, var(--progress, #4facfe) 35%, transparent);
        pointer-events: none;
        z-index: 1;
        transition: width .5s cubic-bezier(.2,.75,.15,1), background .3s;
      }

      /* Indicator dot — follows active button center */
      .tl-indicator {
        position: absolute;
        top: 47px;
        width: 18px;
        height: 18px;
        left: 0;
        border: 2px solid var(--indicator, #ef7d69);
        border-radius: 50%;
        pointer-events: none;
        z-index: 3;
        box-shadow:
          0 0 0 6px color-mix(in srgb, var(--indicator, #ef7d69) 14%, transparent),
          0 4px 14px color-mix(in srgb, var(--indicator, #ef7d69) 28%, transparent);
        transition: left .55s cubic-bezier(.2,.75,.15,1), border-color .3s, box-shadow .3s;
        transform: translateX(-50%);
      }

      /* Buttons — matching original's 74px width, clean flex column */
      .desktop-timeline button {
        flex: 0 0 74px;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0;
        border: 0;
        background: transparent;
        color: var(--muted);
        cursor: pointer;
        font-family: inherit;
        scroll-snap-align: center;
        position: relative;
        z-index: 2;
        -webkit-tap-highlight-color: transparent;
        transition: transform .25s cubic-bezier(.2,.8,.2,1);
        padding: 0;
      }
      .desktop-timeline button:active { transform: scale(.94); }

      /* Dot — absolute within button, centered on line */
      .desktop-timeline .dot {
        position: absolute;
        left: 50%;
        top: 47px;
        width: 18px;
        height: 18px;
        transform: translateX(-50%);
        border: 4px solid #f5f6f8;
        border-radius: 50%;
        background: #c9ced8;
        box-shadow: 0 0 0 1px #c9ced8;
        flex-shrink: 0;
        transition: .35s cubic-bezier(.2,.8,.2,1);
      }

      /* Even (0,2,4,6): text BELOW the line */
      .desktop-timeline button.below {
        justify-content: flex-start;
        padding-top: 78px;
      }
      /* Odd (1,3,5): text ABOVE the line */
      .desktop-timeline button.above {
        justify-content: flex-end;
        padding-bottom: 78px;
      }

      /* Text area */
      .desktop-timeline .time-copy {
        padding: 0;
        text-align: center;
        width: 100%;
        transition: .3s;
      }
      .desktop-timeline .time {
        display: block;
        font: 500 9px/1.3 "SF Mono", "Cascadia Code", "Consolas", "Menlo", monospace;
        letter-spacing: .03em;
        color: #98a1b1;
        white-space: nowrap;
        transition: color .3s;
      }
      .desktop-timeline .company-name {
        display: block;
        margin-top: 5px;
        font-size: 11px;
        font-weight: 500;
        line-height: 1.35;
        color: #8a95a8;
        transition: color .3s, font-weight .3s;
        max-width: 70px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      /* Active state — matching original's gradients */
      .desktop-timeline button[aria-current="true"] { color: var(--ink); }
      .desktop-timeline button[aria-current="true"] .dot {
        background: linear-gradient(135deg, #fff 0 22%, var(--card) 23%);
        border-color: #fff;
        box-shadow:
          0 0 0 1px var(--card),
          0 0 0 7px color-mix(in srgb, var(--card) 16%, transparent),
          0 5px 14px color-mix(in srgb, var(--card) 28%, transparent);
        transform: translateX(-50%) scale(1.18);
      }
      .desktop-timeline button[aria-current="true"] .time { color: var(--muted); }
      .desktop-timeline button[aria-current="true"] .company-name {
        color: var(--card);
        font-weight: 700;
        font-size: 12px;
      }

      /* Preview state — matching original's hover */
      .desktop-timeline button.preview .dot {
        background: color-mix(in srgb, var(--card) 40%, #c9ced8);
        border-color: color-mix(in srgb, var(--card) 20%, #f5f6f8);
        transform: translateX(-50%) scale(1.15);
      }
      .desktop-timeline button.preview .company-name {
        color: var(--ink);
        font-weight: 600;
      }

      /* ── Mobile Card Stage ── */
      .bookstage {
        position: relative;
        height: auto;
        min-height: auto;
        perspective: none;
        /* Reserve one 44px step per later card: 38px time rail + 6px separation. */
        margin: 16px 0 calc(60px + var(--stack-tail, 0px));
      }
      .bookstage::after { display: none; }
      .bookstage.is-flipping { pointer-events: none; }

      /* Mobile card: vertical sectioned layout + stacking */
      .card {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        padding: 28px 24px 22px;
        border: 1px solid rgba(255, 255, 255, .75);
        border-bottom: 4px solid color-mix(in srgb, var(--card) 64%, #fff);
        border-radius: 20px;
        background: linear-gradient(155deg, rgba(255,255,255,.97), rgba(249,251,255,.92));
        box-shadow:
          7px 7px 0 0 color-mix(in srgb, var(--card) 32%, #fff),
          0 2px 10px rgba(27, 38, 55, .05),
          inset 0 1px rgba(255, 255, 255, .9);
        transform: translateY(0) scale(1);
        filter: none;
        transition: transform .4s cubic-bezier(.2,.75,.15,1), opacity .3s ease, filter .3s ease;
        touch-action: pan-y;
      }
      .card::before {
        opacity: .4;
        background:
          radial-gradient(ellipse at 100% 0, color-mix(in srgb, var(--card) 10%, transparent), transparent 55%),
          radial-gradient(ellipse at 0% 100%, color-mix(in srgb, var(--card) 4%, transparent), transparent 40%);
      }
      /* ── Mobile stacking: fixed source-order slots with progressive depth ── */
      /* The selected card moves to the main position and defines the stage height.
         Every lower card keeps its original source-order slot; the selected card's
         former slot stays empty, so no remaining card shifts or changes order. */
      .card.active {
        position: relative;
        inset: auto;
        width: 100%;
        margin-inline: 0;
      }
      .card[data-pos="0"] {
        transform: translateY(0);
        filter: none;
        z-index: 8;
        opacity: 1;
      }
      .card[data-pos="1"],
      .card[data-pos="2"],
      .card[data-pos="3"],
      .card[data-pos="4"],
      .card[data-pos="5"],
      .card[data-pos="6"] {
        left: calc(var(--card-pos) * 4px);
        right: calc(var(--card-pos) * 4px);
        width: auto;
        transform: translateY(calc(var(--card-pos) * 44px));
        filter: none;
        opacity: 1;
      }

      /* Non-active stacked cards: hide content, only show date strip at bottom edge */
      .card:not(.active) {
        overflow: hidden;
      }
      .card:not(.active) > *:not(.card-date-strip):not(.card-ripple) {
        display: none;
      }
      .card:not(.active) .card-date-strip {
        opacity: 1;
        filter: none;
      }
      .card:not(.active) .card-ripple {
        display: none;
      }

      /* Date strip — visible at bottom edge of stacked cards */
      .card-date-strip {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 38px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 9px;
        padding: 0 18px 2px;
        background: linear-gradient(to top,
          color-mix(in srgb, var(--card) 18%, #fff) 0%,
          color-mix(in srgb, var(--card) 8%, #fff) 72%,
          rgba(255,255,255,.94) 100%);
        border-top: 1px solid color-mix(in srgb, var(--card) 18%, #e8ebf1);
        border-radius: 0 0 20px 20px;
        font: 650 10px/1 "SF Mono", "Cascadia Code", "Consolas", "Menlo", monospace;
        letter-spacing: .07em;
        color: color-mix(in srgb, var(--card) 76%, #445066);
        pointer-events: none;
        z-index: 2;
      }
      .card-date-strip .date-time { white-space: nowrap; }
      .card-date-strip .date-dot {
        width: 3px; height: 3px; border-radius: 50%;
        background: color-mix(in srgb, var(--card) 50%, #bcc3d0);
      }
      .card-date-strip .date-duration {
        font-weight: 700;
        color: color-mix(in srgb, var(--card) 80%, #3a4458);
      }
      /* Active card: date strip hidden (content is already visible) */
      .card.active .card-date-strip { opacity: 0; }

      /* Active card children: always visible */
      .card.active > *:not(.card-ripple):not(.card-date-strip):not(.card-ribbon) { filter: none !important; opacity: 1 !important; position: relative; z-index: 1; }

      /* ── Corner Ribbon (SVG, geometrically matched to the 20px card radius) ── */
      .outline-duration { display: none; }
      .card-ribbon,
      .card.active > .card-ribbon {
        position: absolute;
        top: -1px;
        right: -1px;
        width: 96px;
        height: 96px;
        z-index: 10;
        pointer-events: none;
        transform-origin: 100% 0;
      }
      .card-ribbon svg {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        display: block;
        overflow: visible;
      }
      .card-ribbon text {
        fill: #fff;
        font: 700 12px/1 "SF Mono", "Cascadia Code", "Consolas", "Menlo", monospace;
        letter-spacing: .06em;
        text-anchor: middle;
        dominant-baseline: middle;
        filter: drop-shadow(0 1px 2px rgba(0,0,0,.18));
      }

      /* Header bar: index · location */
      .card-header-bar {
        display: flex;
        align-items: center;
        gap: 10px;
        padding-bottom: 10px;
        margin-bottom: 24px;
        border-bottom: 1px solid rgba(0,0,0,.05);
      }
      .card-header-bar .index {
        font: 500 11px/1 "SF Mono", "Cascadia Code", "Consolas", "Menlo", monospace;
        letter-spacing: .12em;
        color: var(--card);
      }

      /* Company name */
      .card h2 {
        max-width: 58%;
        margin: 0 0 10px;
        font-size: 24px !important;
        letter-spacing: -.05em;
        line-height: 1.16;
        color: var(--ink);
        font-weight: 800;
      }

      /* Role */
      .role {
        font-size: 14px !important;
        margin: 0 0 0;
        color: var(--card);
        font-weight: 600;
        letter-spacing: -.01em;
      }

      /* Section divider — subtle, tinted */
      .card-divider {
        border: 0;
        height: 1px;
        margin: 18px 0 16px;
        opacity: .5;
      }

      /* Bullet list — restored detail content */
      .detail-list {
        list-style: none;
        padding: 0;
        margin: 0;
        display: flex;
        flex-direction: column;
        gap: 14px;
      }
      .detail-list li {
        position: relative;
        padding-left: 18px;
        font-size: 14px;
        line-height: 1.8;
        color: #3d4a5f;
      }
      .detail-list li::before {
        content: "";
        position: absolute;
        left: 0;
        top: 8px;
        width: 7px;
        height: 7px;
        border-radius: 2px;
        background: var(--card);
        opacity: .58;
      }

      /* Small spacer between content and tags */
      .card-spacer {
        height: 18px;
        flex-shrink: 0;
      }

      /* Tags — compact at bottom */
      .tags {
        gap: 8px;
        padding-top: 0;
        margin-top: 0;
        margin-bottom: 10px;
        flex-wrap: wrap;
      }
      .tags span {
        padding: 6px 12px;
        font-size: 11px;
        border-width: 1px;
        border-color: color-mix(in srgb, var(--card) 16%, #e5e8ee);
        background: rgba(255,255,255,.5);
        border-radius: 999px;
        color: #526075;
      }

      /* Card counter — footer, centered, clear of content */
      .card-count {
        display: block;
        position: static;
        margin: 20px auto 0;
        padding-top: 16px;
        border-top: 1px solid rgba(0,0,0,.04);
        font: 500 11px/1 "SF Mono", "Cascadia Code", "Consolas", "Menlo", monospace;
        letter-spacing: .08em;
        color: #bcc3d0;
        text-align: center;
        width: 100%;
      }

      /* Remove desktop-specific + unused elements */
      .card-top, .duration, .summary, .header-duration { display: none; }

      /* ── Ripple: click-to-ripple water wave ── */
      .card-ripple {
        position: absolute;
        inset: 0;
        border-radius: inherit;
        pointer-events: none;
        z-index: 0;
        overflow: hidden;
      }
      .ripple-wave {
        position: absolute;
        border-radius: 50%;
        pointer-events: none;
        background: radial-gradient(circle, color-mix(in srgb, var(--card) 22%, transparent) 0%, color-mix(in srgb, var(--card) 8%, transparent) 50%, transparent 70%);
        animation: rippleExpand .7s ease-out forwards;
      }
      @keyframes rippleExpand {
        0%   { transform: translate(-50%,-50%) scale(0); opacity: .9; }
        60%  { opacity: .5; }
        100% { transform: translate(-50%,-50%) scale(4); opacity: 0; }
      }

      /* Desktop card: subtle translate, not rotate */
      @media (min-width: 761px) {
        .card.active {
          will-change: transform;
          transition: transform .3s cubic-bezier(.2,.75,.15,1), box-shadow .3s ease;
        }
      }

      /* Remove swipe hint */
      .swipe-hint { display: none; }

      /* ── Mobile controls: bottom sheet ── */
      .controls {
        position: fixed;
        top: auto;
        bottom: 16px;
        right: 16px;
        z-index: 20;
      }
      .control-toggle {
        width: 40px;
        height: 40px;
        font-size: 16px;
        border-radius: 50%;
        box-shadow: 0 6px 20px rgba(79, 172, 254, .4);
      }
      .control-panel {
        position: fixed;
        top: auto;
        bottom: 0;
        left: 0;
        right: 0;
        width: 100%;
        max-height: 60vh;
        overflow-y: auto;
        padding: 20px 16px 28px;
        border-radius: 20px 20px 0 0;
        border: 1px solid rgba(255, 255, 255, .9);
        border-bottom: 0;
        background: rgba(255, 255, 255, .94);
        box-shadow: 0 -8px 40px rgba(27, 38, 55, .12);
        backdrop-filter: blur(20px);
        transform: translateY(100%);
        opacity: 1;
      }
      .controls.open .control-panel {
        transform: translateY(0);
        pointer-events: auto;
      }
      .control-panel h3 {
        font-size: 14px;
        margin-bottom: 18px;
      }
      .control-row {
        margin-top: 14px;
      }
      .control-row label {
        font-size: 12px;
      }
      .control-row input {
        height: 28px;
      }

      /* Mobile backdrop for control panel */
      .control-backdrop {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, .18);
        z-index: 19;
      }
      .controls.open ~ .control-backdrop { display: block; }
    }

        details:['负责客户沟通与美工全流程，准确理解并拆解需求','完成画册、展板与书籍设计，保证视觉交付品质','将业务需求高效转换为可交付的完整视觉方案'],
        tags:['客户对接','展板设计','画册设计','书籍设计'] },
      { time:'2015.06 — 2018.06', duration:'36M', company:'四川方正印刷厂',          shortName:'方正印刷', place:'四川', role:'平面设计师 · 独立全案', color:'#d86c82',
        text:'建立印刷品全案工作体系，支持标书、画册、字体与广告平面等多类项目，夯实从设计到印刷的完整能力。',
        details:['建立印刷品全案工作体系，支持多类型项目并行','负责标书、画册、字体与广告平面的设计与落地','善于发现问题并建立可扩展工作流，减少重复性劳动'],
        tags:['全案体系','可扩展工作流','字体设计','高效执行'] }
    ];

    const timeline = document.querySelector('#timeline');
    const stage = document.querySelector('#bookstage');
    let activeIndex = 0;
    let isFlipping = false;

    /* ── Controls ── */
    const controls = document.querySelector('#controls');
    const controlToggle = document.querySelector('#controlToggle');
    const controlBackdrop = document.querySelector('#controlBackdrop');
    const stackInputs = {
      x: document.querySelector('#stackX'), y: document.querySelector('#stackY'),
      depth: document.querySelector('#stackDepth'), outlineSize: document.querySelector('#outlineSize'),
      outlineStroke: document.querySelector('#outlineStroke'), outlineGap: document.querySelector('#outlineGap'),
      outlineX: document.querySelector('#outlineX'), outlineY: document.querySelector('#outlineY'),
      typeScale: document.querySelector('#typeScale'), pulseCycle: document.querySelector('#pulseCycle'),
      enterDuration: document.querySelector('#enterDuration')
    };

    const STORAGE_KEY = 'resume-mobile-controls';
    const savedControls = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
    Object.entries(stackInputs).forEach(([key, input]) => {
      if (savedControls[key] != null) input.value = savedControls[key];
    });

    function saveControls() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(
        Object.fromEntries(Object.entries(stackInputs).map(([key, input]) => [key, input.value]))
      ));
    }

    function applyLayerLayout() {
      const x = Number(stackInputs.x.value);
      const y = Number(stackInputs.y.value);
      const depth = Number(stackInputs.depth.value) / 10;
      const outlineSize = Number(stackInputs.outlineSize.value);
      const outlineStroke = Number(stackInputs.outlineStroke.value) / 10;
      const outlineGap = Number(stackInputs.outlineGap.value) / 100;
      const outlineX = Number(stackInputs.outlineX.value);
      const outlineY = Number(stackInputs.outlineY.value);
      const typeScale = Number(stackInputs.typeScale.value) / 100;

      stage.querySelectorAll('.card').forEach(card => {
        const pos = Number(card.dataset.pos);
        card.style.setProperty('--offset-x', `${pos * x}px`);
        card.style.setProperty('--offset-y', `${pos * y}px`);
        card.style.setProperty('--offset-r', `${pos * depth}deg`);
        card.style.setProperty('--duration-size', `${outlineSize}px`);
        card.style.setProperty('--duration-stroke', `${outlineStroke}px`);
        card.style.setProperty('--duration-gap', `${outlineGap}em`);
        card.style.setProperty('--duration-x', `${outlineX}px`);
        card.style.setProperty('--duration-y', `${outlineY}px`);
        card.querySelector('h2').style.fontSize = isMobile()
          ? null
          : `clamp(${(25 * typeScale).toFixed(1)}px, ${(3.2 * typeScale).toFixed(2)}vw, ${(38 * typeScale).toFixed(1)}px)`;
        if (!isMobile()) {
          card.querySelector('.role').style.fontSize = `${(15 * typeScale).toFixed(1)}px`;
          card.querySelector('.summary').style.fontSize = `${(14 * typeScale).toFixed(1)}px`;
        }
      });

      document.querySelector('#stackXValue').textContent = `${x}px`;
      document.querySelector('#stackYValue').textContent = `${y}px`;
      document.querySelector('#stackDepthValue').textContent = `${depth.toFixed(1)}°`;
      document.querySelector('#outlineSizeValue').textContent = `${outlineSize}px`;
      document.querySelector('#outlineStrokeValue').textContent = `${outlineStroke.toFixed(1)}px`;
      document.querySelector('#outlineGapValue').textContent = `${outlineGap.toFixed(2)}em`;
      document.querySelector('#outlineXValue').textContent = `${outlineX}px`;
      document.querySelector('#outlineYValue').textContent = `${outlineY}px`;
      document.querySelector('#typeScaleValue').textContent = `${Math.round(typeScale * 100)}%`;
      document.querySelector('#pulseCycleValue').textContent = `${(Number(stackInputs.pulseCycle.value) / 10).toFixed(1)}s`;
      document.querySelector('#enterDurationValue').textContent = `${(Number(stackInputs.enterDuration.value) / 100).toFixed(1)}s`;
    }

    /* ── Control panel toggle ── */
    controlToggle.addEventListener('click', () => {
      const open = controls.classList.toggle('open');
      controlToggle.setAttribute('aria-expanded', String(open));
      controlToggle.textContent = open ? '×' : '⚙';
    });
    controlBackdrop.addEventListener('click', () => {
      controls.classList.remove('open');
      controlToggle.setAttribute('aria-expanded', 'false');
      controlToggle.textContent = '⚙';
    });

    Object.values(stackInputs).forEach(input => {
      input.addEventListener('input', () => {
        applyLayerLayout();
        saveControls();
        if (input === stackInputs.pulseCycle) {
          startPulse(timeline.querySelector('[aria-current="true"] .dot'));
        }
      });
    });

    /* ── Activate card ── */
    function activate(index) {
      if (index === activeIndex || index < 0 || index >= entries.length) return;
      /* State-driven render only. Avoid inline GSAP opacity/transform values so every
         selected card always returns to its complete, readable content state. */
      activeIndex = index;
      render(activeIndex);
      scrollTimelineToActive();
    }

    /* ── Scroll timeline to active ── */
    function scrollTimelineToActive() {
      if (!isMobile()) return;
      const activeBtn = timeline.querySelector('[aria-current="true"]');
      if (!activeBtn) return;
      activeBtn.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
    }

    /* ── Mobile timeline indicator (matching original: fill from ::before line edge to active btn) ── */
    function updateMobileIndicator(active) {
      if (!isMobile()) return;
      const activeBtn = timeline.querySelector('[aria-current="true"]');
      if (!activeBtn) return;
      const indicator = timeline.querySelector('.tl-indicator');
      const fill = timeline.querySelector('.tl-fill');
      const timelineRect = timeline.getBoundingClientRect();
      const btnRect = activeBtn.getBoundingClientRect();
      const btnCenter = btnRect.left + btnRect.width / 2 - timelineRect.left;

      indicator.style.setProperty('--indicator', entries[active].color);
      indicator.style.left = `${btnCenter}px`;

      fill.style.setProperty('--progress', entries[active].color);
      fill.style.left = '16px';
      fill.style.width = `${Math.max(0, btnCenter - 16)}px`;
    }

    function updateDesktopIndicator(active) {
      if (isMobile()) return;
      const button = timeline.querySelector(`[data-index="${active}"]`);
      const indicator = timeline.querySelector('.tl-indicator');
      if (!button || !indicator) return;
      indicator.style.setProperty('--indicator', entries[active].color);
      indicator.style.top = `${button.offsetTop + 3}px`;
      const fill = timeline.querySelector('.tl-fill');
      fill.style.setProperty('--progress', entries[active].color);
      fill.style.top = `${button.offsetTop + 12}px`;
    }

    function updateIndicator(active) {
      if (isMobile()) {
        updateMobileIndicator(active);
      } else {
        updateDesktopIndicator(active);
      }
    }

    function previewProgress(index) {
      if (isMobile()) {
        const button = timeline.querySelector(`[data-index="${index}"]`);
        if (!button) return;
        const fill = timeline.querySelector('.tl-fill');
        const timelineRect = timeline.getBoundingClientRect();
        const btnRect = button.getBoundingClientRect();
        const btnCenter = btnRect.left + btnRect.width / 2 - timelineRect.left;
        fill.style.setProperty('--progress', entries[index].color);
        fill.style.left = '16px';
        fill.style.width = `${Math.max(0, btnCenter - 16)}px`;
      } else {
        const button = timeline.querySelector(`[data-index="${index}"]`);
        const fill = timeline.querySelector('.tl-fill');
        if (!button || !fill) return;
        fill.style.setProperty('--progress', entries[index].color);
        fill.style.top = `${button.offsetTop + 12}px`;
      }
    }

    function previewTimeline(index) {
      timeline.querySelectorAll('button').forEach(button =>
        button.classList.toggle('preview', Number(button.dataset.index) === index)
      );
      previewProgress(index);
    }

    function startPulse(dot) {
      if (!window.gsap || !dot) return;
      gsap.killTweensOf(dot);
      gsap.to(dot, {
        scale: 1.34,
        duration: Number(stackInputs.pulseCycle.value) / 10,
        ease: 'sine.inOut',
        yoyo: true,
        repeat: -1
      });
    }

    function animateState() {
      if (!window.gsap) return;
      const activeDot = timeline.querySelector('[aria-current="true"] .dot');
      const activeCard = stage.querySelector('.card.active');
      if (!activeDot || !activeCard) return;

      gsap.fromTo(activeDot, { scale: .72, opacity: .3 }, { scale: 1.18, opacity: 1, duration: .55, ease: 'back.out(2)' });
      gsap.to(activeDot, {
        scale: 1.34,
        duration: Number(stackInputs.pulseCycle.value) / 10,
        ease: 'sine.inOut',
        yoyo: true,
        repeat: -1,
        delay: .55
      });

      if (isMobile()) {
        gsap.fromTo(activeCard, { y: 30, opacity: 0 }, { y: 0, opacity: 1, duration: .5, ease: 'power3.out' });
      } else {
        gsap.fromTo(activeCard, { y: 28, opacity: .25 }, { y: 0, opacity: 1, duration: .68, ease: 'power3.out' });
      }

      gsap.fromTo(
        activeCard.querySelectorAll('.card-ribbon svg,.card-header-bar,h2,.role,.card-divider,.detail-list li,.card-spacer,.tags,.card-count'),
        { y: 15, opacity: 0 },
        { y: 0, opacity: 1, duration: .48, stagger: .06, delay: .16, ease: 'power2.out' }
      );
    }

    /* Cards do not follow, tilt, glow, or ripple with the mouse.
       Interaction is intentionally limited to click/tap selection and touch swipe. */

    /* ── Swipe detection ── */
    let touchStartX = 0, touchStartY = 0;
    stage.addEventListener('touchstart', e => {
      if (!isMobile()) return;
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
    }, { passive: true });

    stage.addEventListener('touchend', e => {
      if (!isMobile() || isFlipping) return;
      const dx = e.changedTouches[0].clientX - touchStartX;
      const dy = e.changedTouches[0].clientY - touchStartY;
      // Only horizontal swipes (|dx| > 2*|dy|) with enough distance
      if (Math.abs(dx) < 44 || Math.abs(dx) < Math.abs(dy) * 2) return;
      if (dx < 0 && activeIndex < entries.length - 1) {
        activate(activeIndex + 1);
      } else if (dx > 0 && activeIndex > 0) {
        activate(activeIndex - 1);
      }
    });

    /* ── Render ── */
    function render(active = 0) {
      const mobile = isMobile();

      // Timeline
      if (mobile) {
        timeline.innerHTML =
          '<span class="tl-fill" aria-hidden="true"></span>' +
          '<span class="tl-indicator" aria-hidden="true"></span>' +
          entries.map((e, i) => `
            <button type="button" data-index="${i}" style="--card:${e.color}" aria-current="${i === active}" class="${i % 2 === 0 ? 'below' : 'above'}">
              <i class="dot"></i>
              <span class="time-copy">
                <span class="time">${e.time}</span>
                <span class="company-name">${e.shortName}</span>
              </span>
            </button>
          `).join('');
      } else {
        timeline.innerHTML =
          '<span class="tl-fill" aria-hidden="true"></span>' +
          '<span class="tl-indicator" aria-hidden="true"></span>' +
          entries.map((e, i) => `
            <button type="button" data-index="${i}" style="--card:${e.color}" aria-current="${i === active}">
              <i class="dot"></i>
              <span class="time-copy">
                <span class="time">${e.time}</span>
                <span class="company-name">${e.company}</span>
              </span>
            </button>
          `).join('');
      }

      // Cards
      if (mobile) {
        /* Fixed slots: source index 1-6 always maps to stack position 1-6.
           The selected card alone moves to position 0; its old position is not filled. */
        stage.style.setProperty('--stack-tail', `${(entries.length - 1) * 44}px`);
        stage.innerHTML = entries.map((e, i) => {
          const isActive = i === active;
          const stackPos = isActive ? 0 : i;
          return `
            <article class="card mobile-card ${isActive ? 'active' : ''}" data-index="${i}" data-pos="${stackPos}" style="--card:${e.color};--card-pos:${stackPos};z-index:${isActive ? entries.length + 1 : entries.length - stackPos}">
              <div class="card-ripple" aria-hidden="true"></div>
              <div class="card-ribbon" aria-hidden="true">
                <svg viewBox="0 0 96 96" xmlns="http://www.w3.org/2000/svg">
                  <!-- The 20px radius meets the top/right edges 20px from the corner.
                       A 20px circular arc reproduces that corner; the 45° diagonal ends
                       at the fold hinge so the ribbon remains geometrically consistent. -->
                  <path d="M0 0 H76 A20 20 0 0 1 96 20 V68 L82 82 Z" fill="var(--card)" />
                  <path d="M96 68 L96 96 L82 82 Z" fill="color-mix(in srgb, var(--card) 72%, #263244)" />
                  <path d="M82 82 L96 96 H82 Z" fill="color-mix(in srgb, #fff 88%, var(--card))" />
                  <!-- Centroid of the 96px right isosceles ribbon triangle: (64, 32). -->
                  <g transform="translate(64 32) rotate(45)">
                    <text x="0" y="0">${e.duration}</text>
                  </g>
                </svg>
              </div>
              <div class="card-header-bar">
                <span class="index">${String(i + 1).padStart(2, '0')}</span>
              </div>
              <h2>${e.company}</h2>
              <p class="role">${e.role}</p>
              <hr class="card-divider" style="border-color:color-mix(in srgb, ${e.color} 18%, transparent)">
              <ul class="detail-list">
                ${e.details.map(d => `<li>${d}</li>`).join('')}
              </ul>
              <hr class="card-divider" style="border-color:color-mix(in srgb, ${e.color} 18%, transparent)">
              <div class="card-spacer"></div>
              <div class="tags">${e.tags.map(t => `<span>${t}</span>`).join('')}</div>
              <span class="card-count">${String(i + 1).padStart(2, '0')} / ${String(entries.length).padStart(2, '0')}</span>
              <div class="card-date-strip" aria-hidden="true">
                <span class="date-time">${e.time}</span>
                <span class="date-dot"></span>
                <span class="date-duration">${e.duration}</span>
              </div>
            </article>
          `;
        }).join('');
      } else {
        stage.style.removeProperty('--stack-tail');
        stage.innerHTML = entries.map((e, i) => {
          const pos = i;
          const layer = i === active ? entries.length + 1 : entries.length - pos;
          return `
            <article class="card ${i === active ? 'active' : ''}" data-index="${i}" data-pos="${pos}" style="--card:${e.color};z-index:${layer}">
              <div class="card-ripple" aria-hidden="true"></div>
              <div class="card-top">
                <span class="index">${String(i + 1).padStart(2, '0')}</span>
                <span class="place">${e.place}</span>
              </div>
              <span class="duration" aria-label="工作时长 ${e.duration}">${e.duration}</span>
              <h2>${e.company}</h2>
              <p class="role">${e.role}</p>
              <p class="summary">${e.text}</p>
              <div class="tags">${e.tags.map(t => `<span>${t}</span>`).join('')}</div>
              <span class="card-count">${String(i + 1).padStart(2, '0')} / ${String(entries.length).padStart(2, '0')}</span>
            </article>
          `;
        }).join('');
      }

      // Bind timeline buttons — click/tap only, no pointer-hover preview.
      timeline.querySelectorAll('button').forEach(b => {
        const index = Number(b.dataset.index);
        b.addEventListener('click', () => activate(index));
      });

      // Bind card clicks
      stage.querySelectorAll('.card').forEach(card => {
        const index = Number(card.dataset.index);
        card.addEventListener('click', () => activate(index));
      });

      applyLayerLayout();
      updateIndicator(active);

      if (mobile) {
        // Delay to let DOM settle, then scroll
        requestAnimationFrame(() => {
          requestAnimationFrame(() => scrollTimelineToActive());
        });
      }

      requestAnimationFrame(animateState);
    }

    /* ── Resize handler: re-render when crossing breakpoint ── */
    let wasMobile = isMobile();
    window.addEventListener('resize', () => {
      const nowMobile = isMobile();
      if (nowMobile !== wasMobile) {
        wasMobile = nowMobile;
        render(activeIndex);
        if (nowMobile) {
          requestAnimationFrame(() => {
            requestAnimationFrame(() => scrollTimelineToActive());
          });
        }
      } else if (nowMobile) {
        updateMobileIndicator(activeIndex);
      }
    });

    /* Keep mobile timeline fill + indicator aligned during scroll */
    timeline.addEventListener('scroll', () => {
      if (isMobile()) updateMobileIndicator(activeIndex);
    }, { passive: true });

    /* ── Init ── */
    render(activeIndex);
    window.addEventListener('load', () => {
      animateState();
      if (isMobile()) scrollTimelineToActive();
    }, { once: true });
  </script>
</body>
</html>
